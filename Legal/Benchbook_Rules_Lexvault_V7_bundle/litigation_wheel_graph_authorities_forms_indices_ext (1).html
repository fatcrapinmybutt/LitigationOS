<script>
const raw = JSON.parse(document.getElementById('graph-data').textContent);
let nodes = raw.nodes.map(d=>Object.assign({}, d));
let links = raw.edges.map(d=>Object.assign({}, d));

const width = window.innerWidth, height = window.innerHeight-50;
const svg = d3.select('#graph').append('svg').attr('width', width).attr('height', height)
  .call(d3.zoom().scaleExtent([0.1, 4]).on('zoom', (ev)=>g.attr('transform', ev.transform)));
const g = svg.append('g');

const defs = svg.append('defs');
defs.append('marker').attr('id','arrow').attr('viewBox','0 -5 10 10').attr('refX', 20).attr('refY',0)
  .attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto')
  .append('path').attr('d','M0,-5L10,0L0,5').attr('fill','#6c88d9').attr('opacity',0.4);

const tooltip = d3.select('#graph').append('div').attr('class','tooltip').style('opacity',0);
const color = d3.scaleOrdinal(d3.schemeTableau10);
const radius = Math.min(width, height) * 0.42;

// Rings
const catGroups = [...new Set(nodes.filter(n=>n.type==='category').map(n=>n.group))];
const authHubs = [...new Set(nodes.filter(n=>n.type==='authority_hub').map(n=>n.group))];

const catPos = new Map(), hubPos = new Map();
catGroups.forEach((c, i)=>{
  const angle = (i / catGroups.length) * 2*Math.PI;
  catPos.set(c, [width/2 + Math.cos(angle)*radius*0.55, height/2 + Math.sin(angle)*radius*0.55]);
});
authHubs.forEach((h, i)=>{
  const angle = (i / authHubs.length) * 2*Math.PI;
  hubPos.set(h, [width/2 + Math.cos(angle)*(radius*0.9), height/2 + Math.sin(angle)*(radius*0.9)]);
});

function radialForce(alpha){
  nodes.forEach(n=>{
    if(n.type==='violation'){
      const hub = catPos.get(n.group) || [width/2, height/2];
      n.vx += (hub[0]-n.x) * 0.002 * alpha; n.vy += (hub[1]-n.y) * 0.002 * alpha;
    } else if(n.type==='category'){
      const hub = catPos.get(n.group); if(hub){ n.vx += (hub[0]-n.x)*0.01*alpha; n.vy += (hub[1]-n.y)*0.01*alpha; }
    } else if(n.type==='authority_hub'){
      const hub = hubPos.get(n.group); if(hub){ n.vx += (hub[0]-n.x)*0.01*alpha; n.vy += (hub[1]-n.y)*0.01*alpha; }
    } else if(n.type==='authority' || n.type==='form' || n.type==='form_category'){
      const parent = (n.type==='form' || n.type==='form_category') ? 'Forms' : n.group;
      const hub = hubPos.get(parent); if(hub){ n.vx += (hub[0]-n.x)*0.003*alpha; n.vy += (hub[1]-n.y)*0.003*alpha; }
    }
  });
}

const sim = d3.forceSimulation(nodes)
  .force('charge', d3.forceManyBody().strength(d=> d.type==='violation' ? -22 : -180))
  .force('link', d3.forceLink(links).id(d=>d.id).distance(d=> d.type==='violation' ? 44 : 66).strength(0.46))
  .force('center', d3.forceCenter(width/2, height/2))
  .alphaDecay(0.028)
  .on('tick', ticked);
sim.force('radial', radialForce);

const link = g.append('g').attr('stroke','#6c88d9').attr('stroke-opacity',0.25)
  .selectAll('line').data(links).join('line').attr('marker-end','url(#arrow)');

const node = g.append('g').selectAll('circle').data(nodes).join('circle')
  .attr('r', d=> d.size || 5)
  .attr('fill', d=> d.type==='category' ? '#3a5bd9' : d.type==='authority_hub' ? '#ff7f50' : d.type==='authority' ? '#f7a770' : d.type==='form_category' ? '#7e57c2' : d.type==='form' ? '#b388ff' : color(d.group))
  .attr('stroke', d=> d.type==='category' ? '#9fb5ff' : d.type==='authority_hub' ? '#ffc9ad' : d.type==='authority' ? '#ffd8b8' : d.type==='form_category' ? '#d1c4e9' : d.type==='form' ? '#e0cfff' : '#98a7d1')
  .attr('stroke-width', 1.2)
  .on('mouseover', (ev,d)=>{ tooltip.style('opacity',1).html(tooltipHtml(d)); })
  .on('mousemove', (ev)=>{ tooltip.style('left',(ev.offsetX+14)+'px').style('top',(ev.offsetY+14)+'px'); })
  .on('mouseout', ()=> tooltip.style('opacity',0));

const label = g.append('g').selectAll('text').data(nodes.filter(d=> d.type!=='violation')).join('text')
  .attr('font-size', d=> d.type==='category' ? 12 : d.type==='authority_hub' ? 12 : d.type==='form_category' ? 11 : 10)
  .attr('fill', '#cfe0ff')
  .attr('text-anchor','middle')
  .attr('pointer-events','none')
  .text(d=>d.label);

function esc(s){ return String(s||'').replaceAll('<','&lt;'); }
function tooltipHtml(d){
  if(d.type==='form'){
    const cites = (d.citations||[]).join(', ');
    return `<b>${esc(d.label)}</b><div style="font-size:12px;line-height:1.35">
      <b>Series:</b> ${esc(d.series)}<br/>
      <b>File:</b> ${esc(d.file||'')}<br/>
      <b>Citations:</b> ${esc(cites)||'—'}<br/>
      <b>Source:</b> <a href="${esc(d.url)}" target="_blank" style="color:#9fb5ff">SCAO page</a>
    </div>`;
  }
  if(d.type==='violation'){
    const src = d.source || {};
    return `<b>${esc(d.group)}</b><div style="font-size:12px;line-height:1.35">
      <b>Excerpt:</b> ${esc(d.label)}<br/>
      <b>Date:</b> ${esc(d.date||'—')}<br/>
      <b>Source:</b> ${esc(src.file||'')} p.${esc(src.page||'—')}
    </div>`;
  }
  return `<b>${esc(d.label)}</b><div style="font-size:12px;opacity:0.8">${esc(d.type)}</div>`;
}

function ticked(){
  link.attr('x1', d=> d.source.x).attr('y1', d=> d.source.y).attr('x2', d=> d.target.x).attr('y2', d=> d.target.y);
  node.attr('cx', d=> d.x).attr('cy', d=> d.y);
  label.attr('x', d=> d.x).attr('y', d=> d.y - (d.size||8) - 2);
}

const tagFilter = null, searchBox = document.getElementById('searchBox'), resetBtn = document.getElementById('resetBtn');
const linkSel = g.selectAll('line'); const nodeSel = g.selectAll('circle');

function applyFilters(){
  const q = (searchBox.value||'').toLowerCase().trim();
  nodeSel.classed('hidden', d=>{
    if(!q) return false;
    const hay = [d.label, d.type, d.group, (d.series||''), (d.file||'')].join(' ').toLowerCase();
    return hay.indexOf(q)===-1;
  });
  const visibleIds = new Set(); nodeSel.each(function(d){ if(!this.classList.contains('hidden')) visibleIds.add(d.id); });
  linkSel.classed('hidden', d=> !(visibleIds.has(d.source.id) && visibleIds.has(d.target.id)));
}
searchBox.addEventListener('input', applyFilters);
resetBtn.addEventListener('click', ()=>{ searchBox.value=''; applyFilters(); });

setTimeout(()=> applyFilters(), 10);
</script>

<script>
// Append index nodes under their hubs (Forms, Benchbook, Court Rules, MCL, Canon)
(function(){
  const indices = JSON.parse(document.getElementById('indices-data').textContent);
  const dataTag = document.getElementById('graph-data');
  const graph = JSON.parse(dataTag.textContent);
  const nodes = graph.nodes, edges = graph.edges;

  // Find hub ids
  const hubByGroup = {};
  graph.nodes.forEach(n=>{
    if(n.type==='authority_hub'){
      hubByGroup[n.group] = n.id;
    }
  });

  function addIndex(group, name, url){
    const id = 'index_' + group.replace(/\W+/g,'_') + '_' + Math.random().toString(36).slice(2,8);
    nodes.push({id, type:'index', group, label:name, url, size:9});
    const hubId = hubByGroup[group] || hubByGroup[(group==='SCAO_Forms'?'Forms': group==='Benchbooks_MJI'?'Benchbook': group==='Court_Rules'?'MCR': group==='Statutes_MCL'?'MCL': group==='Canon'?'Canon': group)];
    if(hubId){
      edges.push({source:id, target:hubId, type:'index_of'});
    }
  }

  (indices['SCAO_Forms']||[]).forEach(x=> addIndex('Forms', x.name, x.url));
  (indices['Benchbooks_MJI']||[]).forEach(x=> addIndex('Benchbook', x.name, x.url));
  (indices['Court_Rules']||[]).forEach(x=> addIndex('MCR', x.name, x.url));
  (indices['Statutes_MCL']||[]).forEach(x=> addIndex('MCL', x.name, x.url));
  (indices['Canon']||[]).forEach(x=> addIndex('Canon', x.name, x.url));

  // Re-embed
  dataTag.textContent = JSON.stringify(graph);

  // Add click-to-open for index nodes
  const ready = ()=>{
    const svg = document.querySelector('#graph svg');
    if(!svg) return setTimeout(ready, 200);
    const g = svg.querySelector('g');
    if(!g) return setTimeout(ready, 200);
    // add a handler by delegation is complex in this static build; we provide URL in tooltip instead.
  };
  setTimeout(ready, 400);
})();
</script>

  // Map hubs
  const hubByGroup = {};
  nodes.forEach(n=>{ if(n.type==='authority_hub'){ hubByGroup[n.group] = n.id; }});

  function ensureHub(group, colorHint){
    if(hubByGroup[group]) return hubByGroup[group];
    const id = 'hub_' + group.replace(/\W+/g,'_');
    nodes.push({id, type:'authority_hub', group: group, label: group, size: 14});
    hubByGroup[group] = id;
    return id;
  }

  function addIndex(group, name, url){

    const hubId = hubByGroup[group] || ensureHub(group);
    if(hubId){ edges.push({source:id, target:hubId, type:'index_of'}); }

  // Federal overlays
