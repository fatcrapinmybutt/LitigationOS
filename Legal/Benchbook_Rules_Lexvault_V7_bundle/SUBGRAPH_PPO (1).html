<!doctype html>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PPO Subgraph (Offline)</title>
<style>
  :root{--bg:#0c111a;--fg:#cfe3ff;--panel:#131b26cc;}
  html,body,#wrap{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,Segoe UI,Roboto}
  #hud{position:absolute;top:8px;left:8px;background:var(--panel);padding:10px;border-radius:12px;font-size:12px;z-index:2}
  input,select,button{font-size:12px;border-radius:8px;border:0;padding:6px 8px;background:#1f2633;color:var(--fg)}
  #canvas{width:100%;height:100%}
</style>
<div id="hud">
  <b>PPO Subgraph</b> • Nodes: 0 • Edges: 0
  <div><input id="q" placeholder="search"/><button id="png">PNG</button> <button id="invert">Light/Dark</button></div>
</div>
<canvas id="canvas"></canvas>
<script>
const DATA = {"nodes": [], "edges": []};
(function(){
  const nodes=DATA.nodes, edges=DATA.edges;
  const canvas=document.getElementById('canvas'), ctx=canvas.getContext('2d');
  let W,H,scale=260,ox=0,oy=0,lab=12; function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight; draw();}; resize(); addEventListener('resize',resize);
  let q='';
  // radial layout
  const sorted=[...nodes].sort((a,b)=>(b.deg||0)-(a.deg||0)); const N=sorted.length||1, pos=new Map();
  for(let i=0;i<N;i++){ const t=i/N*2*Math.PI; const r=1+(i/N)*0.85; pos.set(sorted[i].id,{x:Math.cos(t)*r,y:Math.sin(t)*r}); }
  function scr(x,y){ return [x*scale + W/2 + ox, y*scale + H/2 + oy]; }
  function vis(n){ if(!q) return true; return (n.label||'').toLowerCase().includes(q); }
  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.globalAlpha=0.25; ctx.strokeStyle='#8aa';
    for(const e of edges){ const a=pos.get(e.s), b=pos.get(e.t); if(!a||!b) continue;
      const p1=scr(a.x,a.y), p2=scr(b.x,b.y); ctx.beginPath(); ctx.moveTo(p1[0],p1[1]); ctx.lineTo(p2[0],p2[1]); ctx.stroke();
    }
    ctx.globalAlpha=1.0;
    for(const n of nodes){ if(!vis(n)) continue; const p=pos.get(n.id), s=scr(p.x,p.y);
      let color = (/(mcr|mcl|canon|usc|constitution)/i.test(n.label||'')) ? '#d97706' : '#ff6b6b';
      if(n.src==='AJP') color = '#60a5fa';
      ctx.beginPath(); ctx.fillStyle=color; ctx.arc(s[0],s[1], Math.max(2, Math.min(10, 2 + (n.deg||0)/10)), 0, Math.PI*2); ctx.fill();
    }
    if(scale>320 || q){ ctx.fillStyle='#eaeaea'; ctx.font=lab+'px system-ui';
      for(const n of nodes){ if(!vis(n)) continue; const p=pos.get(n.id), s=scr(p.x,p.y); ctx.fillText((n.label||n.id).slice(0,64), s[0]+8, s[1]-8); }
    }
  }
  document.getElementById('q').addEventListener('input', e=>{ q=(e.target.value||'').toLowerCase(); draw(); });
  document.getElementById('png').onclick = ()=>{ const a=document.createElement('a'); a.href=canvas.toDataURL('image/png'); a.download='PPO_subgraph.png'; a.click(); };
  document.getElementById('invert').onclick = ()=>{ const r=document.documentElement; if(r.style.getPropertyValue('--bg')==='#ffffff'){ r.style.setProperty('--bg','#0d1117'); r.style.setProperty('--fg','#eaeaea'); } else { r.style.setProperty('--bg','#ffffff'); r.style.setProperty('--fg','#111111'); } draw(); };
  // basic pan/zoom
  let dragging=false,lx=0,ly=0;
  canvas.addEventListener('mousedown', e=>{ dragging=true; lx=e.clientX; ly=e.clientY; });
  addEventListener('mouseup', ()=>dragging=false);
  addEventListener('mousemove', e=>{ if(!dragging) return; ox += e.clientX-lx; oy += e.clientY-ly; lx=e.clientX; ly=e.clientY; draw(); });
  canvas.addEventListener('wheel', e=>{ e.preventDefault(); const s=Math.exp(-e.deltaY/600); scale*=s; draw(); }, {passive:false});
  draw();
})();
</script>
