# FILE: 34_DefaultPack.FullSpectrum.v1.yaml
version: v1.0
defaultpack_fullspectrum:
  goal: "from inception→closeout with deterministic recursion and heavy exports"
  packs:
    INCEPTION_PACK: {emit:[CASE_STATE,ObjectiveAtoms,Unknowns,AcquisitionTasks]}
    ORDER_SPINE_PACK: {emit:[OOP,OrderGraph,TermTable,AttackSurface]}
    THEORY_PACK: {emit:[IssueAtoms,ElementGrid,ReliefStack,AuthorityTriples,BurdenGrid,SORMap,DiscretionMap]}
    EVIDENCE_PACK: {emit:[ExhibitMatrix,AuthPlan,HearsayPlan,FoundationScripts,ImpeachmentBundles]}
    DRAFT_PACK: {emit:[PacketDraft,ProposedOrder,ProofOfService,ExhibitIndex,TOC]}
    QA_PACK: {emit:[LintReport,RedTeamReport,PatchPlan,FinalLintChecklist]}
    COURTPACK: {emit:[Manifest,Courtpack,Readme,FileNamingPlan]}
    HEARING_PACK: {emit:[HearingScriptPack,ObjectionBlocks,OoPBlocks,RulingPrompts,ClosingScript]}
    POST_DECISION_PACK: {emit:[DenialTrapMatrix,EscalationTree,NextMoveSelector]}
  sequencing:
    - INCEPTION_PACK
    - ORDER_SPINE_PACK
    - THEORY_PACK
    - EVIDENCE_PACK
    - DRAFT_PACK
    - QA_PACK
    - COURTPACK
    - HEARING_PACK
    - POST_DECISION_PACK
  recursion:
    triggers: [new_order,new_roa,new_transcript,new_denial,new_evidence,new_deadline]
    rerun_packs: [ORDER_SPINE_PACK,THEORY_PACK,EVIDENCE_PACK,DRAFT_PACK,QA_PACK,COURTPACK]
If you say only continue, the next expansion layer is to split the remaining “full spectrum” lawyer workflow into additional YAML modules: research/citation verification, motion bank generation, fact-to-element compiler, forms field compiler, case strategy state machine, regression tests, artifact diffing, and end-to-end run recipes per lane (TRIAL/ENF/REC/COA/MSC/JTC/FOIA) so the system can execute as a deterministic compiler with repeatable outputs.





