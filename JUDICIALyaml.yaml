# FILE: 08_ValidationRedTeam.v1.yaml
version: v1.0
lint_rules:
  caption: [court_correct,case_no_present,party_roles_correct,judge_present]
  signature: [signed,dated,capacity_stated]
  service: [method_allowed,address_ok,proof_attached,dates_consistent]
  deadlines: [computed,drop_dead,holiday_adjusted,unknowns_flagged]
  pii: [redactions_applied,mcr_1_109_compliance]
  pdf: [ocr_enabled,8_5x11,page_numbers,no_password,size_limit]
  exhibit_foundation: [auth_plan_present,hearsay_plan_present,relevance_chain_present,pinpoint_present_or_task]
  findings: [findings_requested,checkboxes_in_order,denial_trap_ready]
  vehicle: [proper_vehicle,proper_court,prereqs_met]
  scope: [relief_narrow_enforceable,conditional_branches_coherent]
redteam_scenarios:
  - name: WrongVehicleDismissal
    attack: ["court says wrong procedure/jurisdiction"]
    patch: ["VehicleMap alternates; gate analysis; refile path"]
  - name: TimelinessAttack
    attack: ["untimely motion/appeal"]
    patch: ["DeadlineMatrix; trigger-date proof; tolling theory if applicable"]
  - name: ServiceDefectAttack
    attack: ["non-service/defective service"]
    patch: ["ServiceChain + cure plan + rebuttal pack"]
  - name: HearsayCollapse
    attack: ["exhibits excluded as hearsay"]
    patch: ["HearsayPlan + nonhearsay purpose + custodian route + witness fallback"]
  - name: MissingFindings
    attack: ["court denies without findings"]
    patch: ["Findings headings + proposed order checkboxes + ruling prompts + denial trap"]
  - name: Overbreadth
    attack: ["relief too broad"]
    patch: ["narrow relief + conditional branches + interim relief alternative"]
outputs:
  emit: [LintReport,VulnerabilityList,PatchPlan,FinalLintChecklist]
