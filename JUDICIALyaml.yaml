2) FORGE.OperatorCatalogue.v1.yaml (operators; signatures; emits; dependencies; failure modes)
version: v1.0
call_grammar:
  - "RUN:OpName(param=value;...;emit=a,b,c)"
  - "PIPE:OpA(...)>OpB(...)>OpC(...)"
operators:
  - op: CASE.StateBuild
    sig: {case_id: str, lane: enum, objective: str}
    emits: [CASE_STATE]
    notes: ["posture snapshot: controlling orders, last action, next deadlines, risk flags"]
  - op: ORDER.OOPBuild
    sig: {controlling_orders: list, roa_required: bool}
    emits: [OOP]
    fails: ["missing order data→emit acquisition tasks + placeholder OOP rows tagged UNKNOWN"]
  - op: ORDER.OrderGraphBuild
    sig: {OOP: obj}
    emits: [OrderGraph,TermTable,AttackSurface]
  - op: ORDER.TermAtomize
    sig: {order_text: str|ref, quote_mode: enum}
    emits: [TermTable,ViolationTriggers,RemedyHooks]
  - op: VEH.VehicleMap
    sig: {lane: enum, objective: str, court: enum}
    emits: [VehicleMap,GateChecklist,AlternateStack,MicroVehicleList]
  - op: AUTH.AuthorityTriplesPlus
    sig: {issues: list, authority_include: list}
    emits: [AuthorityTriples,BurdenGrid,SORMap,DiscretionMap,FindingsChecklist]
  - op: AUTH.BenchbookMirror
    sig: {issue_atoms: list}
    emits: [FindingsMap,FindingsHeadings,OrderCheckboxes,DenialTrapMatrix,ClosingScript]
  - op: FORM.FormRouter
    sig: {vehicle: str, court: enum, filing_channel: enum}
    emits: [FormRouter,FormPacketSpec,ClerkAcceptanceChecklist,PDFComplianceSpec]
  - op: PACK.PacketRecipe
    sig: {packet_kind: enum, relief_stack: list}
    emits: [PacketRecipe,OutcomeMatrix,ConditionalReliefTree,ComplianceMechanics]
  - op: EVID.ExhibitMatrixBuild
    sig: {fact_atoms: list, exhibits_available: list}
    emits: [ExhibitMatrix,AuthPlan,HearsayPlan,RelevanceChains,ImpeachmentBundles]
  - op: EVID.FoundationScripts
    sig: {ExhibitMatrix: obj}
    emits: [FoundationScripts,AdmissionSequence]
  - op: REC.BiTemporalTimeline
    sig: {events: list, roa_map: obj|nil}
    emits: [BiTemporalTimeline,ROAMap,AnomalyLedger]
  - op: REC.StatementIndex
    sig: {sources: list}
    emits: [StatementIndex,QuoteCandidates]
  - op: TIME.DeadlinesCompute
    sig: {lane: enum, triggers: list, deadline_days: int|nil}
    emits: [DeadlinesMatrix,DropDeadDates,UnknownDeadlineFlags]
  - op: SVC.ServiceChainBuild
    sig: {service_method: list, parties: obj}
    emits: [ServiceChain,CurePlan,NonServiceRebuttalPack]
  - op: HEAR.HearingScriptPack
    sig: {issues: list, exhibits: obj}
    emits: [HearingScript,ObjectionBlocks,OoPBlocks,RulingPrompts,90secClose]
  - op: FRICT.ProceduralFrictionReport
    sig: {OOP: obj, ROAMap: obj}
    emits: [FrictionReport,MicroVehicleDraftBlocks,SilentDocketCountermeasures]
  - op: RED.RedTeam
    sig: {packet: obj, lint: list, redteam_level: enum}
    emits: [VulnerabilityList,PatchPlan,FinalLintChecklist]
  - op: PACK.ManifestBuild
    sig: {outputs: list}
    emits: [Manifest,PacketIndex,FileNamingPlan]
  - op: SBNA.NextMoveSelector
    sig: {CASE_STATE: obj, risk: obj}
    emits: [SBNA]
operator_families:
  ORDER: [ORDER.OOPBuild,ORDER.OrderGraphBuild,ORDER.TermAtomize]
  AUTH: [AUTH.AuthorityTriplesPlus,AUTH.BenchbookMirror]
  FORM: [FORM.FormRouter]
  PACK: [PACK.PacketRecipe,PACK.ManifestBuild]
  EVID: [EVID.ExhibitMatrixBuild,EVID.FoundationScripts]
  REC: [REC.BiTemporalTimeline,REC.StatementIndex]
  TIME_SVC: [TIME.DeadlinesCompute,SVC.ServiceChainBuild]
  HEAR_FRICT: [HEAR.HearingScriptPack,FRICT.ProceduralFrictionReport]
  QA: [RED.RedTeam,SBNA.NextMoveSelector]
default_pipeline:
