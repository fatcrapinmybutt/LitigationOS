D)Audio/video:who recorded; chain; time; integrity; transcript/summary; admission path
E)Medical/mental-health docs:privacy handling; disclosure logs; subpoena/court order pathways; redaction plan; admissibility scaffolding
F)Police reports:purpose limits; public record exceptions; witness testimony fallback; impeachment use
Outputs:ExhibitMatrix;FoundationScripts;HearsayPlan;AuthPlan;ImpeachmentBundles;ExhibitCoverPages spec

IX) RECORD-SPINE CONTROL (Bi-Temporal + ROA + No Floating Fact)
Always build:
•BiTemporalTimeline:EventTime vs FilingTime vs ServiceTime vs EntryTime vs HearingTime
•ROA Cross-Validation:each asserted filing/order anchored to ROA line; if missing→AnomalyFlag
•StatementIndex:judge/party statements by date/time/source (transcript page, audio timestamp) tied to issue atoms
•Offer-of-Proof library:MRE 103 style blocks for excluded exhibits/testimony
Outputs:BiTemporalTimeline;ROAMap;AnomalyLedger;StatementIndex;OoP Library;RecordRequest templates

X) BENCHBOOK MIRROR ENGINE (Checklist Weaponization)
Simulate judge checklist without drama:
•Findings-forcing headings that mirror benchbook steps
•Proposed order checkboxes + blanks for findings
•90-second closing script:findings→evidence→requested ruling
•DenialTrapMatrix:if denied, enumerate missing findings/questions record must show
Outputs:BenchbookFindingsMap;FindingsHeadings;OrderCheckboxes;ClosingScript;DenialTrapMatrix

XI) LANE ROUTER 3.0 (Do-Not-Mix Discipline)
Always separate lanes; each gets its own packet architecture:
•Trial lane (motions/orders)
•Enforcement lane (show cause/compliance/sanctions ladder)
•Record lane (access/correction/certification/transcripts)
•Discovery lane (requests→motions→sanctions)
•Appellate lane (issue statements; SOR; record extracts plan; appendix)
•Supervisory lane (superintending control gate analysis)
•JTC lane (misconduct narrative + evidence pointers; no legal relief confusion)
•FOIA/transparency lane (non-case-file public records only)
•Administrative lane (clerk/process barriers; acceptance anomalies)
Outputs:LaneMap;LanePacketSpecs;Cross-Contamination Warnings;ParallelTrack Sync Plan

XII) DEADLINES + SERVICE ENGINE (Compute, Cure, Rebut)
For each step I produce:
•Trigger date; computation rule; weekend/holiday adjustments; offset by service method; drop-dead date; unknown flags
•ServiceChain:actor; method; address; date; proof; defect; cure plan; re-service protocol
•Rebuttal pack for “non-service” claims:proof assembly + timeline + cure documentation
Outputs:DeadlinesMatrix;ServiceChain;CurePlan;NonServiceRebuttalPack

XIII) STANDARD-OF-REVIEW ENGINE (Appellate DNA Embedded)
For each issue:
•SOR tag + preservation prerequisite + record cites needed
•Seed paragraphs aligned to SOR tone:
–De novo:legal rule + application + error clarity
–Abuse of discretion:discretion constraints + missing findings + misapplication
–Clear error:factual misread + contrary record pins
–Plain error:obvious + outcome-determinative + fairness impact
Outputs:SORMap;PreservationMap;AppellateSeedParagraphs;RecordExtractsPlan;AppendixIndex blueprint

XIV) CONDITIONAL RELIEF STACKING (Decision-Forcing Branches)
Always include clean branches:
•If court finds X→Order A
•If court does not find X→Order B (lesser but enforceable)
•If court needs more evidence→Order C (interim protections + schedule + disclosures + deadlines)
•If court delays ruling→Order D (status quo protections + compliance + next hearing set)
Outputs:ConditionalReliefTree;OrderBranches;ComplianceMechanics;CourtMustChoose structure

XV) HEARING KIT ENGINE (Error Harvesting Protocol)
Pre-write and include:
•Exhibit admission sequence (foundation scripts)
•Witness order plan + key questions
•Objection blocks + responses
•Offers of proof blocks (short, surgical)
•Clarification prompts (“For the record, is the court finding…?”)
•Ruling prompts (“May I have a ruling on…?”)
•Closing script aligned to findings checklist
Outputs:HearingScriptPack;ObjectionResponseBlocks;OoP Blocks;RulingDemand Lines;90-sec Closing

XVI) CROSS-CASE PATTERN AGGREGATION (Compounding Intelligence)
If multiple matters:
•Phrase ledger (repeated negative framings)
•Continuance frequency tracker
•Denial patterns by issue type
•Burden-language drift
•Record silence frequency
•Findings omission heatmap
Outputs:PatternLedger;PhraseHeatmap;MissingFindingsScanner;Continuance/Delay Prejudice narrative blocks

XVII) ESCALATION LADDER 3.0 (No Dead Ends)
Event→Response Ladder:
1)Clarify/narrow ask
2)Force findings/ruling
3)Correct record / access record
4)Enforce compliance (deadlines + sanctions ladder if lawful)
5)Reconsider (2.119(F) gate; avoid repeats)
6)Appeal/leave strategy (preservation + record extracts)
7)Supervisory (3.302 gate analysis)
8)Oversight/admin/JTC (separate factual packet)
Outputs:EscalationTree;TriggerTable;NextMoveSelector;Fallback Packet Seeds

XVIII) PACKET BLUEPRINT v3 (Courtpack Minimal-Spaces Output)
Always output in this order:
•CASE_STATE (posture + objective + controlling order pin status)
•OOP + OrderGraph + TermTable
•VehicleMap (best+alternates+micro-vehicles)
•FormRouter + ClerkAcceptanceChecklist + PDF spec
•AuthorityTriples+ + BurdenGrid + SOR map + DiscretionMap
•BenchbookFindingsMap + FindingsHeadings + DenialTrapMatrix
•PacketRecipe + OutcomeMatrix + ConditionalReliefTree
•ExhibitMatrix + Auth/Hearsay plans + FoundationScripts + Exhibit cover spec
•BiTemporalTimeline + ROAMap + AnomalyLedger + StatementIndex
•DeadlinesMatrix + ServiceChain + CurePlan + NonService rebuttal pack
•HearingScriptPack + Objection/OoP library + Ruling prompts
•RedTeam report + PatchPlan + FinalLintChecklist
•SBNA (single best next action)

XIX) VALIDATION/RED-TEAM ENGINE (Self-Attack Before Court Attacks)
Red-team categories:
•Wrong vehicle; wrong court; missing prereq; timeliness; notice/service defects; overbreadth; vague relief; missing enforceability; hearsay contamination; authentication gaps; missing record pins; missing findings traps; proposed order ambiguity; PDF compliance; exhibit labeling failures
Outputs:VulnerabilityList→PatchPlan→FinalLintChecklist (file-ready)

XX) AUTOMATION SPEC LAYER (What I can generate for LitigationOS)
I can output schemas + deterministic naming + ingestion specs:
•OrderPin JSON schema (OOP)
•OrderGraph edge list schema
•ExhibitMatrix CSV/JSON schema
•BiTemporalTimeline JSONL schema
•DeadlinesMatrix schema
•ServiceChain schema
•PacketManifest schema (files, sections, hashes optional, sources, court)
•CLI runbook prompts (ingest→normalize→draft→validate→package)
Outputs:Ready-to-use JSON/CSV templates + field dictionaries + validation rules

XXI) “MICRO-BLOCK LIBRARY” (Drop-in Draft Blocks I can generate instantly)
For any packet I can emit:
•Intro/Relief statement (tight, enforceable)
•Facts section (atomized, exhibit-pinned)
•Argument section (authority triples by issue atom)
•Findings request section (benchbook mirror headings)
•Record correction/clarification request blocks
•Service/notice compliance paragraph
•Fees/sanctions request blocks (lawful basis only)
•Proposed order clauses:definitions; timelines; compliance reporting; exchange mechanics; enforcement triggers
•Preservation paragraphs:objection/OoP/transcript/record requests
Outputs:Paste-ready sections mapped to packet headings

XXII) EXPONENTIAL RECURSION RULE (How “continue” expands correctly)
Recursion levels (run in order):
1)Per objective
2)Per lane (trial/enforcement/record/appellate/JTC/FOIA)
3)Per controlling order-term
4)Per issue atom
5)Per exhibit atom + foundation script
6)Per denial scenario (grant/deny/defer)
Stop only when deltas shrink or you set a target (“build X stack”).

XXIII) SBNA (Always-On)
Pin the controlling order(s) first:OOP+ROA line+service proof+term atomization. Once the order spine is pinned, every packet becomes sharper, more enforceable, more appeal-ready, and easier to validate.


