      "EXHIBIT_INDEX + EXHIBIT_COVERS",
      "PROPOSED_ORDER(checkbox_findings + compliance mechanics)",
      "PROOF_OF_SERVICE",
      "CERTIFICATE(PII/OCR/etc if desired)"
    ]
  EnforcementPacket.Shell:
    sections: [
      "CAPTION",
      "MOTION_TO_ENFORCE/SHOW_CAUSE_REQUEST",
      "ORDER_TERM_TABLE(quoted/pinpointed if available)",
      "VIOLATION_GRID(term_id→act/omission→date→proof)",
      "RELIEF_LADDER(makeup time/compliance deadlines/reporting/sanctions basis if lawful)",
      "PROPOSED_ORDER(enforcement triggers)",
      "PROOF_OF_SERVICE"
    ]
  RecordAccessPacket.Shell:
    sections: [
      "CAPTION",
      "MOTION/REQUEST_FOR_RECORD_ACCESS(copies,inspection,certification,recording)",
      "WHY_NEEDED(preservation/appellate necessity)",
      "REQUESTED_ITEMS(list+date ranges)",
      "PROPOSED_ORDER(access timeline)",
      "PROOF_OF_SERVICE"
    ]
  ExhibitCover.Page:
    fields: {exh_id:"Exhibit __",desc:"__",source:"__",date:"__",offering_party:"__",foundation:"MRE ___",pinpoint:"pg/line/time"}
  ProposedOrder.CheckboxFindings:
    pattern: [
      "FINDING□Court finds ___ based on Exhibit __ (pinpoint __).",
      "FINDING□Court finds ___ under MCL ___ and MCR ___.",
      "ORDER□Relief A effective __.",
      "ORDER□If not A then Relief B.",
      "ORDER□Compliance: __ by __; proof filed by __.",
      "ORDER□Next hearing date/time set: __."
    ]
  HearingScript.90secClose:
    pattern: ["(1)Issue+Standard (2)Required findings (3)Evidence pins (4)Requested ruling (5)If deny, request specific findings/ruling on record"]
  OfferOfProof.Block:
    pattern: ["For the record: I offer Exhibit __ / testimony of __ to prove __; basis: relevance MRE 401; admissibility path: __; prejudice controlled by __."]
