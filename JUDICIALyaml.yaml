Evidence you hunt: timestamp deltas (submitted vs accepted vs served vs entered), missing service artifacts, ROA anomalies.

B) Transcript cost / access chokepoint
When transcripts are expensive/delayed, appellate rights weaken.

Measurable signals: delay between request and delivery; inconsistency across hearings; missing audio retention.

C) Narrative framing zone (data entry / event coding)
Event codes / docket text shape downstream meaning.

Measurable signals: inconsistent event descriptions for similar filings; “missing” events that appear in receipts; outlier denial rates.

D) FOIA exemption overuse zone
County FOIA pages list broad exemption categories and explicitly exclude court records. 

Move: narrow requests to non-case-file records (contracts, logs, policies, training docs).

