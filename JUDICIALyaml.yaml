MiCOURT Case Search API (official, documented)
What you can do (lawfully):

Search by case number or participant name (firstName, lastName). 

Filter via fq= (field:value style filtering, multi-values). 

Page via limit and offset; “Starter” tier caps behavior. 

Optional “expand” resources (judge, participants, charges, nextHearing, etc.)—but expansion is tier/permission gated. 

Recon leverage: This is your cleanest structured ingestion source for a docket-monitor + case indexer because it’s documented and stable-ish.

Virtual Courtroom Info (state guidance + directory)
The state’s virtual courtroom info hub documents support routes and how courts get listed (YouTube channel linking, contact path). 

