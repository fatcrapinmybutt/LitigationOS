version: v1.0
templates:
  MotionPacket.Shell:
    sections: [
      "CAPTION",
      "NOTICE_OF_HEARING(or 'WITHOUT_HEARING' if permitted)",
      "MOTION(RELIEF_REQUESTS)",
      "BRIEF(ISSUE_ATOMS→AUTH_TRIPLES→ARGUMENT)",
