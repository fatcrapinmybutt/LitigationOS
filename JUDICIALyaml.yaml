# FILE: 02_ProcessGraph.v1.yaml
version: v1.0
process_graph:
  nodes:
    - id: INCEPTION
      do: [INTAKE.CaseCreate,INTAKE.Objectives,INTAKE.FactLedgerInit]
      emit: [CASE_STATE,Unknowns]
    - id: TRIAGE
      do: [POSTURE.Scan,JURISD.Verify,LANE.Route,ORDER.Pin,ROA.Map]
      gates: [CorrectCourt,ControllingOrderPinned]
      emit: [VehicleMap,OOP,OrderGraph,BiTemporalTimeline]
    - id: THEORY
      do: [ISSUES.Atomize,ELEMENTS.Grid,RELIEF.Stack,AUTH.Lattice]
      emit: [IssueAtoms,ElementGrid,ReliefStack,AuthorityTriples,BurdenGrid,SORMap]
    - id: FORMS
      do: [FORM.Router,FORM.PacketSpec,CLERK.AcceptanceChecklist]
      emit: [FormRouter,FormPacketSpec,ClerkAcceptanceChecklist,PDFComplianceSpec]
    - id: EVIDENCE
      do: [EVID.Atomize,EVID.Matrix,EVID.FoundationScripts,EVID.ImpeachmentBundles]
      emit: [ExhibitMatrix,AuthPlan,HearsayPlan,FoundationScripts]
    - id: DRAFT
      do: [DRAFT.MotionBrief,DRAFT.Affidavits,DRAFT.ProposedOrder,DRAFT.PoS,DRAFT.Indexes]
      emit: [PacketDraft,ProposedOrder,ProofOfService,ExhibitIndex,TOC]
    - id: VALIDATE
      do: [QA.Lint,QA.RedTeam,QA.PatchPlan]
      gates: [LintPassOrPatchPlan]
      emit: [VulnerabilityList,PatchPlan,FinalLintChecklist]
    - id: PACKAGE
      do: [PACK.Manifest,PACK.NamingPlan,PACK.PDFBuild,PACK.Zip]
      emit: [Manifest,Courtpack,Readme]
    - id: FILE
      do: [FILE.ChannelPlan,FILE.ServiceExecutePlan,FILE.ReceiptCapturePlan]
      emit: [FilingPlan,ServiceChain,DeadlinesMatrix]
    - id: HEARING
      do: [HEAR.ScriptPack,HEAR.ExhibitAdmissionPlan,HEAR.PreservationPrompts]
      emit: [HearingScriptPack,ObjectionBlocks,OoPBlocks,RulingPrompts,ClosingScript]
    - id: POST_DECISION
      do: [DECISION.Normalize,ENF.OrAppeal.Route,REC.RecordRequests]
      emit: [DenialTrapMatrix,EscalationTree,NextMoveSelector]
    - id: ENFORCEMENT
      do: [ENF.ViolationGrid,ENF.ShowCausePacket,ENF.ComplianceMechanics]
      emit: [EnforcementPacket,ComplianceMechanics,ServiceChain]
    - id: APPEAL
      do: [APP.SOR,APP.IssueStatements,APP.RecordExtracts,APP.BriefSkeleton,APP.AppendixIndex]
      emit: [AppealPacket,SORMap,PreservationMap,AppendixIndex]
    - id: CLOSEOUT
      do: [CLOSE.Archive,CLOSE.Retention,CLOSE.LessonsLearned]
      emit: [CloseoutReport,ArchiveManifest]
  edges:
    - {from: INCEPTION,to: TRIAGE}
    - {from: TRIAGE,to: THEORY}
    - {from: THEORY,to: FORMS}
    - {from: FORMS,to: EVIDENCE}
    - {from: EVIDENCE,to: DRAFT}
    - {from: DRAFT,to: VALIDATE}
    - {from: VALIDATE,to: PACKAGE}
    - {from: PACKAGE,to: FILE}
    - {from: FILE,to: HEARING}
    - {from: HEARING,to: POST_DECISION}
    - {from: POST_DECISION,to: ENFORCEMENT,when: "order_violation_or_noncompliance"}
    - {from: POST_DECISION,to: APPEAL,when: "appealable_order_or_leave_strategy"}
    - {from: ENFORCEMENT,to: POST_DECISION}
    - {from: APPEAL,to: POST_DECISION}
    - {from: POST_DECISION,to: CLOSEOUT,when: "objective_complete_and_no_live_deadlines"}
recursion:
  loops:
    - id: LOOP.Refine
      trigger: [new_record,new_order,new_denial,new_evidence,new_deadline]
      rerun: [TRIAGE,THEORY,EVIDENCE,DRAFT,VALIDATE,PACKAGE]
  convergence:
    metric: {new_unique_atoms_ratio: 0.05,duplicate_outputs_ratio: 0.80}
# FILE: 03_Lanes.v1.yaml
version: v1.0
lanes:
  TRIAL:
    purpose: "motions/orders; build record; obtain relief"
    vehicles: [MotionPractice,Disqualification,ReliefFromOrder,Subpoenas]
    outputs: [MotionPacket,ProposedOrder,HearingScriptPack]
  ENF:
    purpose: "enforce existing orders; show cause; compliance mechanics"
    vehicles: [MotionToEnforce,ShowCauseRequest,SanctionsIfLawful]
    outputs: [EnforcementPacket,ViolationGrid,ComplianceMechanics]
  REC:
    purpose: "obtain/inspect/certify record; fix record defects"
    vehicles: [RecordInspectionRequest,CertifiedCopyRequest,TranscriptRequest,AccessToExhibits]
    outputs: [RecordAccessPacket,RecordRequestLedger]
  DISC:
    purpose: "discovery requests→motions→sanctions ladder"
    vehicles: [Requests,Subpoenas,Compel,ProtectiveOrder]
    outputs: [DiscoveryPacket,DiscoveryPlan]
  COA:
    purpose: "appeal in MI Court of Appeals"
    vehicles: [ClaimOfAppeal,ApplicationForLeave,MotionForStay]
    outputs: [AppealPacket,AppendixIndex,SORMap]
  MSC:
    purpose: "MI Supreme Court applications/appeals as applicable"
    vehicles: [Application,MotionForStay]
    outputs: [MSC_Packet]
  SUPERINTEND:
    purpose: "extraordinary control; superintending control (gate-heavy)"
    vehicles: [SuperintendingControl]
    outputs: [SuperintendingPacket,GateAnalysis]
  JTC:
    purpose: "misconduct reporting; lane-separated from legal relief"
    vehicles: [RequestForInvestigation]
    outputs: [JTCPacket,ExhibitIndex,Chronology]
  FOIA:
    purpose: "non-case-file public records from agencies/county"
    vehicles: [FOIARequest,FOIAAppeal]
    outputs: [FOIAPacket,FOIALedger]
  ADMIN:
    purpose: "clerk/process barriers; administrative complaints; access problems"
    vehicles: [ClerkEscalation,AO_LAO_ComplianceComplaint]
    outputs: [AdminPacket,ProcessBarrierLog]
lane_separation_rules:
  do_not_mix:
    - {from: JTC,with: [TRIAL,COA],reason: "misconduct ≠ legal error relief"}
    - {from: FOIA,with: [TRIAL],reason: "court casefile not via FOIA; seek adjacent records"}
