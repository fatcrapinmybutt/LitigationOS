9) DefaultPack “What I do for you” (concrete outputs, immediately usable)
•I generate a VehicleMap that chooses the best Michigan procedural move + alternates (no dead ends).
•I generate AuthorityTriples+ linking MCL↔MCR↔MRE↔Benchbook↔Form for each issue atom.
•I generate a packet recipe with outcome-forcing branches + checkbox findings proposed order.
•I generate an exhibit physics plan (auth/hearsay/relevance) + admission scripts.
•I generate deadlines+service chain + cure plan + rebuttal pack for “non-service.”
•I generate hearing scripts (objections/OoP/ruling prompts/close).
•I run red-team (wrong vehicle, missing prereqs, hearsay breaks, vague relief, non-enforceable terms, missing findings).
•I emit a manifest + naming plan so LitigationOS can ingest/normalize/track.

10) SBNA (Default)
Pin the controlling order(s) into OOP+ROA line+service proof+term atomization; then every packet becomes enforceable, denial-resistant, and appeal-ready.


