2) Vendor & Platform Ecosystem Map (what powers what)
MiFILE (E-filing)
MiFILE project is described as implemented with SCAO and delivered via TrueFiling; the MiFILE project page is hosted by TrueFiling. 

Michigan Legal Help materials + court PDFs identify ImageSoft / TrueFiling as the MiFILE technical vendor/support. 

ImageSoft press release states SCAO partnered with ImageSoft; it references TrueFiling and notes integration with Hyland OnBase as document management. 

MiCOURT (Case Search + APIs)
The MiCOURT Developer Portal is explicit: “At Judicial Information Services, we want courts … to securely access and integrate their court data…” 

The Case Search API is formally documented (query parameters, filters fq=, pagination, and “expand” resources gated by subscription). 

Payments
Some Michigan courts/payment pages are integrated with MiCOURT-based search-and-pay workflows (example vendor claims: WebTecs integrates with MiCOURT). 

Translation: payments can become a secondary metadata surface (balances, case identifiers, timing), depending on the court’s provider.

