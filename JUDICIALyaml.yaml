5) Legal Access Pathways (Michigan + Muskegon reality check)
FOIA: what works vs what doesn’t
Muskegon County FOIA pages explicitly warn: court records are not subject to FOIA and those requests will be denied; they direct you instead to the courts for records. 

Leverage move: FOIA the adjacent systems (IT procurement, vendor contracts, policies, retention schedules, invoices, meeting minutes), not the case file itself.

Where FOIA does bite (high-yield targets)
County procurement / IT / finance (contracts, amendments, payments)

Sheriff / jail records division (subject to exemptions, but requestable categories exist; Muskegon Sheriff has FOIA pathways) 

MDHHS FOIA (state portal + “My Records Center” tracking) 

Court technology policies / standards (often published; also in SCAO guidance pages) 

JTC (Judicial Tenure Commission) reporting mechanism
Michigan court rules chapter 9 includes subchapter 9.200; it describes the JTC framework and clarifies key constraints (e.g., JTC isn’t an appellate court). 

Michigan Attorney General FAQ points people to a JTC “Request for Investigation” form on JTC’s site. 

