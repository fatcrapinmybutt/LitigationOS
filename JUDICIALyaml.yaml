PPO Packet: termination/modify/enforce + admissibility map + speech-safe framing + findings trap.

Custody/PT Packet: best-interest factor grid + parenting-time enforcement + make-up time + findings/order compliance.

Housing/LT Packet: escrow/repairs/utility shutoff narrative → statutory hooks → injunctive/monetary stack → exhibits.

Appellate Packet: claim of appeal / application / brief skeleton + issue statements + standard of review + appendix index.

JTC Packet: misconduct narrative + quote pins + chronology + exhibits + “lane separation” from legal error.

