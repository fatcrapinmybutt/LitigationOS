csv_______id_col_watch_profiles_directories", "label": "      \"id\": \"col_watch_profiles_directories\"", "group": "data", "size": 6, "color": "#0ff", "desc": "{:       \"id\": \"col_watch_profiles_directories\"\nNone: ['']"}, {"id": "csv_______label_directories", "label": "      \"label\": \"directories\"", "group": "data", "size": 6, "color": "#0ff", "desc": "{:       \"label\": \"directories\"\nNone: ['']"}, {"id": "csv_______desc_column_watch_profilesdirectoriesntype_text", "label": "      \"desc\": \"Column: watch_profiles.directories\\nType: TEX", "group": "data", "size": 6, "color": "#0ff", "desc": "{:       \"desc\": \"Column: watch_profiles.directories\\nType: TEXT\""}, {"id": "csv_______id_col_watch_profiles_extensions", "label": "      \"id\": \"col_watch_profiles_extensions\"", "group": "data", "size": 6, "color": "#0ff", "desc": "{:       \"id\": \"col_watch_profiles_extensions\"\nNone: ['']"}, {"id": "csv_______label_extensions", "label": "      \"label\": \"extensions\"", "group": "data", "size": 6, "color": "#0ff", "desc": "{:       \"label\": \"extensions\"\nNone: ['']"}, {"id": "csv_______desc_column_watch_profilesextensionsntype_text", "label": "      \"desc\": \"Column: watch_profiles.extensions\\nType: TEXT", "group": "data", "size": 6, "color": "#0ff", "desc": "{:       \"desc\": \"Column: watch_profiles.extensions\\nType: TEXT\""}, {"id": "csv_______id_col_watch_profiles_exclude_patterns", "label": "      \"id\": \"col_watch_profiles_exclude_patterns\"", "group": "data", "size": 6, "color": "#0ff", "desc": "{:       \"id\": \"col_watch_profiles_exclude_patterns\"\nNone: ['']"}, {"id": "csv_______label_exclude_patterns", "label": "      \"label\": \"exclude_patterns\"", "group": "data", "size": 6, "color": "#0ff", "desc": "{:       \"label\": \"exclude_patterns\"\nNone: ['']"}, {"id": "csv_______desc_column_watch_profilesexclude_patternsntype_text", "label": "      \"desc\": \"Column: watch_profiles.exclude_patterns\\nType", "group": "data", "size": 6, "color": "#0ff", "desc": "{:       \"desc\": \"Column: watch_profiles.exclude_patterns\\nType: TEXT\""}, {"id": "csv_______id_col_watch_profiles_recursive", "label": "      \"id\": \"col_watch_profiles_recursive\"", "group": "data", "size": 6, "color": "#0ff", "desc": "{:       \"id\": \"col_watch_profiles_recursive\"\nNone: ['']"}, {"id": "csv_______label_recursive", "label": "      \"label\": \"recursive\"", "group": "data", "size": 6, "color": "#0ff", "desc": "{:       \"label\": \"recursive\"\nNone: ['']"}, {"id": "csv_______desc_column_watch_profilesrecursiventype_integer", "label": "      \"desc\": \"Column: watch_profiles.recursive\\nType: INTEG", "group": "data", "size": 6, "color": "#0ff", "desc": "{:       \"desc\": \"Column: watch_profiles.recursive\\nType: INTEGER\""}, {"id": "csv_______id_col_watch_profiles_hash_files", "label": "      \"id\": \"col_watch_profiles_hash_files\"", "group": "data", "size": 6, "color": "#0ff", "desc": "{:       \"id\": \"col_watch_profiles_hash_files\"\nNone: ['']"}, {"id": "csv_______label_hash_files", "label": "      \"label\": \"hash_files\"", "group": "data", "size": 6, "color": "#0ff", "desc": "{:       \"label\": \"hash_files\"\nNone: ['']"}, {"id": "csv_______desc_column_watch_profileshash_filesntype_integer", "label": "      \"desc\": \"Column: watch_profiles.hash_files\\nType: INTE", "group": "data", "size": 6, "color": "#0ff", "desc": "{:       \"desc\": \"Column: watch_profiles.hash_files\\nType: INTEGER\""}, {"id": "csv_______id_col_watch_profiles_max_file_size_mb", "label": "      \"id\": \"col_watch_profiles_max_file_size_mb\"", "group": "data", "size": 6, "color": "#0ff", "desc": "{:       \"id\": \"col_watch_profiles_max_file_size_mb\"\nNone: ['']"}, {"id": "csv_______label_max_file_size_mb", "label": "      \"label\": \"max_file_size_mb\"", "group": "data", "size": 6, "color": "#0ff", "desc": "{:       \"label\": \"max_file_size_mb\"\nNone: ['']"}, {"id": "csv_______desc_column_watch_profilesmax_file_size_mbntype_integer", "label": "      \"desc\": \"Column: watch_profiles.max_file_size_mb\\nType", "group": "data", "size": 6, "color": "#0ff", "desc": "{:       \"desc\": \"Column: watch_profiles.max_file_size_mb\\nType: INTEGER\""}, {"id": "csv_______id_col_watch_profiles_created_at", "label": "      \"id\": \"col_watch_profiles_created_at\"", "group": "data", "size": 6, "color": "#0ff", "desc": "{:       \"id\": \"col_watch_profiles_created_at\"\nNone: ['']"}], "links": []};
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const searchInput = document.getElementById('search');
let W, H, dpr;
let cx = 0, cy = 0, zoom = 1;
let dragging = false, dragX = 0, dragY = 0;
let hoveredNode = null, selectedNode = null;
let searchTerm = '';
let simRunning = true;

function resize() {{
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}}
window.addEventListener('resize', resize);
resize();

// Initialize positions
const nodes = DATA.nodes;
const links = DATA.links;
const nodeMap = {{}};
nodes.forEach((n, i) => {{
  n.x = W/2 + (Math.random() - 0.5) * Math.min(W, H) * 0.6;
  n.y = H/2 + (Math.random() - 0.5) * Math.min(W, H) * 0.6;
  n.vx = 0; n.vy = 0;
  nodeMap[n.id] = n;
}});

// Resolve links
links.forEach(l => {{
  if (typeof l.source === 'string') l.sourceNode = nodeMap[l.source];
  if (typeof l.target === 'string') l.targetNode = nodeMap[l.target];
}});

// Build legend
const groups = [...new Set(nodes.map(n => n.group))].sort();
const legend = document.getElementById('legend');
groups.forEach(g => {{
  const sample = nodes.find(n => n.group === g);
  if (!sample) return;
  const d = document.createElement('div');
  d.className = 'leg-item';
  d.innerHTML = `<span class="leg-dot" style="background:${{sample.color}}"></span>${{g}} (${{nodes.filter(n=>n.group===g).length}})`;
  legend.appendChild(d);
}});

document.getElementById('stats').textContent = `${{nodes.length}} nodes | ${{links.length}} links`;

// Force simulation
function simulate() {{
  if (!simRunning) return;
  const alpha = 0.15;
  // Repulsion
  for (let i = 0; i < nodes.length; i++) {{
    for (let j = i+1; j < nodes.length; j++) {{
      let dx = nodes[j].x - nodes[i].x;
      let dy = nodes[j].y - nodes[i].y;
      let d2 = dx*dx + dy*dy + 1;
      let f = -300 / d2;
      let fx = dx * f * alpha;
      let fy = dy * f * alpha;
      nodes[i].vx -= fx; nodes[i].vy -= fy;
      nodes[j].vx += fx; nodes[j].vy += fy;
    }}
  }}
  // Attraction (links)
  links.forEach(l => {{
    if (!l.sourceNode || !l.targetNode) return;
    let dx = l.targetNode.x - l.sourceNode.x;
    let dy = l.targetNode.y - l.sourceNode.y;
    let d = Math.sqrt(dx*dx + dy*dy) + 0.1;
    let f = (d - 80) * 0.01 * alpha;
    let fx = dx/d * f;
    let fy = dy/d * f;
    l.sourceNode.vx += fx; l.sourceNode.vy += fy;
    l.targetNode.vx -= fx; l.targetNode.vy -= fy;
  }});
  // Center gravity
  nodes.forEach(n => {{
    n.vx += (W/2 - n.x) * 0.001 * alpha;
    n.vy += (H/2 - n.y) * 0.001 * alpha;
    n.vx *= 0.85; n.vy *= 0.85;
    n.x += n.vx; n.y += n.vy;
  }});
}}

function draw() {{
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(zoom, zoom);

  // Links
  links.forEach(l => {{
    if (!l.sourceNode || !l.targetNode) return;
    ctx.beginPath();
    ctx.moveTo(l.sourceNode.x, l.sourceNode.y);
    ctx.lineTo(l.targetNode.x, l.targetNode.y);
    ctx.strokeStyle = l.color || '#ffffff22';
    ctx.lineWidth = (l.weight || 1) / zoom;
    ctx.stroke();
  }});

  // Nodes
  const st = searchTerm.toLowerCase();
  nodes.forEach(n => {{
    const match = !st || n.label.toLowerCase().includes(st) || (n.group||'').toLowerCase().includes(st);
    const alpha = match ? 1 : 0.15;
    const r = n.size / zoom;

    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.fillStyle = n.color || '#0f8';
    ctx.globalAlpha = alpha;
    ctx.fill();

    if (n === hoveredNode || n === selectedNode) {{
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2 / zoom;
      ctx.stroke();
    }}

    // Label
    if (zoom > 0.5 || n === hoveredNode || n === selectedNode) {{
      ctx.font = `${{Math.max(9, 11/zoom)}}px 'Segoe UI',sans-serif`;
      ctx.fillStyle = '#eee';
      ctx.globalAlpha = alpha * 0.9;
      ctx.fillText(n.label, n.x + r + 3, n.y + 3);
    }}
    ctx.globalAlpha = 1;
  }});

  ctx.restore();
}}

function getNodeAt(mx, my) {{
  const sx = (mx - cx) / zoom;
  const sy = (my - cy) / zoom;
  for (let i = nodes.length - 1; i >= 0; i--) {{
    const n = nodes[i];
    const dx = sx - n.x, dy = sy - n.y;
    if (dx*dx + dy*dy < (n.size/zoom + 4) ** 2) return n;
  }}
  return null;
}}

canvas.addEventListener('mousedown', e => {{ dragging = true; dragX = e.clientX; dragY = e.clientY; }});
canvas.addEventListener('mouseup', () => {{ dragging = false; }});
canvas.addEventListener('mousemove', e => {{
  if (dragging) {{
    cx += e.clientX - dragX; cy += e.clientY - dragY;
    dragX = e.clientX; dragY = e.clientY;
  }}
  const n = getNodeAt(e.clientX, e.clientY);
  hoveredNode = n;
  if (n) {{
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY + 12) + 'px';
    tooltip.textContent = n.desc || n.label;
  }} else {{
    tooltip.style.display = 'none';
  }}
}});
canvas.addEventListener('click', e => {{
  selectedNode = getNodeAt(e.clientX, e.clientY);
}});
canvas.addEventListener('dblclick', e => {{
  const n = getNodeAt(e.clientX, e.clientY);
  if (n) {{
    cx = W/2 - n.x * zoom;
    cy = H/2 - n.y * zoom;
    zoom = Math.min(zoom * 1.5, 5);
  }}
}});
canvas.addEventListener('wheel', e => {{
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const mx = e.clientX, my = e.clientY;
  cx = mx - (mx - cx) * factor;
  cy = my - (my - cy) * factor;
  zoom *= factor;
  zoom = Math.max(0.1, Math.min(10, zoom));
}}, {{passive: false}});

searchInput.addEventListener('input', e => {{ searchTerm = e.target.value; }});

let frame = 0;
function loop() {{
  if (frame < 300) simulate();
  else simRunning = false;
  draw();
  frame++;
  requestAnimationFrame(loop);
}}
loop();
</script>
