name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release-desktop:
    name: Build & Release Desktop
    runs-on: windows-latest
    defaults:
      run:
        working-directory: 00_SYSTEM/apps/desktop
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: 00_SYSTEM/apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-exe
          path: 00_SYSTEM/apps/desktop/dist/*.exe
          retention-days: 14

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: 00_SYSTEM/apps/desktop/dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-website:
    name: Deploy Website to Vercel
    runs-on: ubuntu-latest
    needs: release-desktop
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        working-directory: 00_SYSTEM/apps/website
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
