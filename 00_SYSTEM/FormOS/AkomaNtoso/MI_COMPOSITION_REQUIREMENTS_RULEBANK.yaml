rules:
  - ruleId: "MI.GLOBAL.PAGE_SIZE"
    type: "format"
    requirement: "8.5x11 view; printable without manipulation; single transcript page per document page."
    source: "MiFILE Electronic Document Standards; MCR 1.109"
  - ruleId: "MI.GLOBAL.FONT"
    type: "format"
    requirement: "12 or 13 pt body; >=10 pt footnotes; exception: SCAO-approved forms."
    source: "MiFILE Electronic Document Standards; MCR 1.109"
  - ruleId: "MI.GLOBAL.MARGINS"
    type: "format"
    requirement: "1 inch top/bottom; 0.5 inch sides; no text/images in margins except court stamps."
    source: "MiFILE Electronic Document Standards"
  - ruleId: "MI.GLOBAL.OCR_PDF"
    type: "efile"
    requirement: "Searchable/OCR PDF; direct-to-PDF conversion when filer controls creation; scanned images restricted."
    source: "MiFILE Electronic Document Standards"
  - ruleId: "MI.GLOBAL.FILE_SIZE"
    type: "efile"
    requirement: "Each file <=25MB; split into parts if needed with naming convention."
    source: "MiFILE Electronic Document Standards"
  - ruleId: "MI.GLOBAL.ATTACHMENT_INDEX"
    type: "efile"
    requirement: "Index to Attachments on last page of lead doc; attachments separately filed; LT/SP exception: combine lead+attachments."
    source: "MiFILE Electronic Document Standards"
  - ruleId: "MI.GLOBAL.SIGNATURE"
    type: "signature"
    requirement: "Document must be signed; /s/ Name acceptable e-signature; unsigned rejected."
    source: "MiFILE Electronic Document Standards; MCR 1.109(E)"
  - ruleId: "MI.GLOBAL.PII"
    type: "pii"
    requirement: "Redact protected PII in public docs and file SCAO PII form when PII must be provided."
    source: "MCR 1.109(D)(9); MiFILE Electronic Document Standards"
  - ruleId: "MI.MOTION.STRUCTURE"
    type: "motion"
    requirement: "Written motions state grounds, authority, relief; legal issues require brief; title must be specific and identify party."
    source: "MCR 2.119; MiFILE Electronic Document Standards"