name: authority-refresh

on:
  schedule:
    - cron: "45 9 * * 1" # Mondays 09:45 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout (no actions/checkout)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout -qf FETCH_HEAD
      - name: Fetch authority sources + lockfile
        run: |
          python3 tools/authority/fetch_scao_authorities.py --ruleset LITIGATIONOS_HYPERPIN_RULESET_repo_r4.json
      - name: Create PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes."
            exit 0
          fi
          git config user.email "actions@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BR="auto/authority-lockfile"
          git checkout -B "${BR}"
          git add stores/authority/authority_sources.lock.json
          git commit -m "chore: refresh authority source lockfile"
          git push -f origin "${BR}"
          python3 tools/github/open_pr.py --base "${GITHUB_REF_NAME:-main}" --head "${BR}" --title "chore: refresh authority source lockfile" --body "Auto-generated by tools/authority/fetch_scao_authorities.py"
