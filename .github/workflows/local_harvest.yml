name: local-harvest

on:
  workflow_dispatch:

jobs:
  harvest:
    runs-on: [self-hosted, windows, litigationos]
    steps:
      - name: Checkout (no actions/checkout)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${env:GH_TOKEN}@github.com/${env:GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${env:GITHUB_REF}"
          git checkout -qf FETCH_HEAD
      - name: Run local harvest (operator machine)
        shell: pwsh
        run: |
          python tools\ingest\local_harvest_stub.py --roots F:\ E:\ D:\ Q:\ Z:\ X:\ --out runs\RUN_local
