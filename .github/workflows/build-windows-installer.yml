name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Inno Setup (Chocolatey)
        run: |
          choco install innosetup -y

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_lite.txt
          pip install pyinstaller

      - name: Build frozen exe
        run: |
          pyinstaller --noconfirm --clean --name DriveNormalizer --add-data "resources;resources" --onefile gui_launcher.py

      - name: Build installer
        run: |
          ISCC.exe inno_setup\DriveNormalizer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DriveNormalizer_Setup
          path: dist_installer/DriveNormalizer_Setup.exe
