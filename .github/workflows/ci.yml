name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-website:
    name: Build Website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 00_SYSTEM/apps/website
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: 00_SYSTEM/apps/website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  build-desktop:
    name: Build Desktop (Electron)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: 00_SYSTEM/apps/desktop
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: 00_SYSTEM/apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 00_SYSTEM/ --max-line-length=120
