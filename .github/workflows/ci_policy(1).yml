name: ci-policy

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no actions/checkout)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout -qf FETCH_HEAD
      - name: Policy gate
        env:
          LIT_POLICY_MODE: fail
        run: |
          python3 tools/ci/policy_gate.py --ruleset LITIGATIONOS_HYPERPIN_RULESET_repo_r4.json
