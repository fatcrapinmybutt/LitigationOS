name: gen-dependabot

on:
  schedule:
    - cron: "15 9 * * 1" # Mondays 09:15 UTC
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout (no actions/checkout)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF}"
          git checkout -qf FETCH_HEAD
      - name: Generate dependabot.yml
        run: |
          python3 -m pip install --upgrade pip pyyaml
          python3 tools/ci/gen_dependabot.py --out .github/dependabot.yml --interval weekly
          git status --porcelain
      - name: Create PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes."
            exit 0
          fi
          git config user.email "actions@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BR="auto/dependabot-yml"
          git checkout -B "${BR}"
          git add .github/dependabot.yml
          git commit -m "chore: regenerate dependabot config"
          git push -f origin "${BR}"
          python3 tools/github/open_pr.py --base "${GITHUB_REF_NAME:-main}" --head "${BR}" --title "chore: regenerate dependabot config" --body "Auto-generated by tools/ci/gen_dependabot.py"
